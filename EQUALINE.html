<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUALINE | Linear Equation Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .input-box { background-color: #1f2937; border: 1px solid #374151; color: white; border-radius: 0.5rem; padding: 0.5rem; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-box:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-4xl w-full text-center mb-8">
        <h1 class="text-4xl font-bold text-blue-500 tracking-wider mb-2">EQUALINE</h1>
        <p class="text-gray-400 text-lg">Linear Equation System Solver</p>
        <div class="h-1 w-24 bg-blue-500 mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold mb-4 text-blue-400">Persamaan 1</h2>
            <div class="space-y-4">
                <div><label class="text-sm text-gray-400">Koefisien x (a1)</label><input type="number" id="a1" value="2" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-400">Koefisien y (b1)</label><input type="number" id="b1" value="3" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-400">Konstanta (c1)</label><input type="number" id="c1" value="12" class="input-box mt-1"></div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold mb-4 text-red-400">Persamaan 2</h2>
            <div class="space-y-4">
                <div><label class="text-sm text-gray-400">Koefisien x (a2)</label><input type="number" id="a2" value="1" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-400">Koefisien y (b2)</label><input type="number" id="b2" value="-1" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-400">Konstanta (c2)</label><input type="number" id="c2" value="1" class="input-box mt-1"></div>
            </div>
        </div>
    </div>

    <button onclick="hitungSPLDV()" class="mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-12 rounded-full shadow-lg transition transform hover:scale-105">
        Hitung Solusi! 🚀
    </button>

    <div id="hasil-container" class="max-w-4xl w-full mt-8 hidden">
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-6 text-center">
            <h2 class="text-2xl font-bold text-green-400 mb-2">Himpunan Penyelesaian (HP)</h2>
            <p id="teks-hasil" class="text-3xl font-mono text-white"></p>
        </div>
        
        <div class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700">
            <canvas id="grafikCanvas" height="150"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;

        function hitungSPLDV() {
            // Ambil nilai dari input
            let a1 = parseFloat(document.getElementById('a1').value);
            let b1 = parseFloat(document.getElementById('b1').value);
            let c1 = parseFloat(document.getElementById('c1').value);
            let a2 = parseFloat(document.getElementById('a2').value);
            let b2 = parseFloat(document.getElementById('b2').value);
            let c2 = parseFloat(document.getElementById('c2').value);

            // Cek Determinasi (apakah garis sejajar)
            let D = (a1 * b2) - (a2 * b1);
            
            let container = document.getElementById('hasil-container');
            let teksHasil = document.getElementById('teks-hasil');

            if (D === 0) {
                container.classList.remove('hidden');
                teksHasil.innerHTML = "<span class='text-red-500 text-lg'>Garis Sejajar / Berimpit (Tidak ada 1 solusi pasti)</span>";
                if(myChart) myChart.destroy();
                return;
            }

            // Hitung nilai X dan Y (Metode Cramer)
            let x = ((c1 * b2) - (c2 * b1)) / D;
            let y = ((a1 * c2) - (a2 * c1)) / D;

            // Tampilkan Hasil
            container.classList.remove('hidden');
            teksHasil.innerText = `{ ${x.toFixed(2).replace(/\.00$/,'')} , ${y.toFixed(2).replace(/\.00$/,'')} }`;

            // Gambar Grafik
            gambarGrafik(a1, b1, c1, a2, b2, c2, x, y);
        }

        function gambarGrafik(a1, b1, c1, a2, b2, c2, x_sol, y_sol) {
            let ctx = document.getElementById('grafikCanvas').getContext('2d');
            
            if(myChart) myChart.destroy(); // Hapus grafik lama jika ada

            // Buat titik bantu untuk menggambar garis panjang
            let rentang = 10;
            let x_min = x_sol - rentang;
            let x_max = x_sol + rentang;

            // Fungsi mencari y jika diketahui x
            let cariY = (a, b, c, val_x) => (c - (a * val_x)) / b;

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: `Garis 1 (${a1}x + ${b1}y = ${c1})`,
                            data: [{x: x_min, y: cariY(a1, b1, c1, x_min)}, {x: x_max, y: cariY(a1, b1, c1, x_max)}],
                            borderColor: '#3b82f6', // Warna Biru
                            borderWidth: 3,
                            pointRadius: 0
                        },
                        {
                            label: `Garis 2 (${a2}x + ${b2}y = ${c2})`,
                            data: [{x: x_min, y: cariY(a2, b2, c2, x_min)}, {x: x_max, y: cariY(a2, b2, c2, x_max)}],
                            borderColor: '#f87171', // Warna Merah
                            borderWidth: 3,
                            pointRadius: 0
                        },
                        {
                            label: 'Titik Potong (Solusi)',
                            data: [{x: x_sol, y: y_sol}],
                            backgroundColor: '#10b981', // Warna Hijau
                            borderColor: '#ffffff',
                            borderWidth: 2,
                            pointRadius: 6,
                            type: 'scatter'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: 'white' } } },
                    scales: {
                        x: { type: 'linear', grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                        y: { type: 'linear', grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
